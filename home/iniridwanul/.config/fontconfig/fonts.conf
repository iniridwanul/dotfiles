<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
<alias>
  <family>serif</family>
  <prefer>
    <family>Neuton</family>
    <family>Hind Siliguri</family>
  </prefer>
</alias>
<alias>
  <family>sans-serif</family>
  <prefer>
    <family>Source Sans Pro</family>
    <family>Hind Siliguri</family>
  </prefer>
</alias>
</fontconfig>